<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados JB - Painel Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">

    <nav class="bg-slate-800 text-white p-3 shadow-lg">
        <div class="max-w-5xl mx-auto flex justify-between items-center text-xs md:text-sm">
            <span class="font-bold text-blue-400">JB_ANALYSIS v1.0</span>
            <div class="flex gap-4">
                <a href="https://aistudio.google.com" target="_blank" class="hover:underline">AI Studio</a>
                <a href="https://github.com" target="_blank" class="hover:underline">GitHub</a>
                <a href="https://vercel.com" target="_blank" class="hover:underline">Vercel</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-800">Sistema de Resultados</h1>
            <p class="text-slate-500">Gestão de Dados & Importação Excel</p>
        </header>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span>📊</span> Importar Planilha (Desde 01/09/2024)
            </h2>
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Selecione o arquivo .xlsx</label>
                    <input type="file" id="inputExcel" accept=".xlsx, .xls" 
                           class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                </div>
                <button id="btnImportar" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition w-full md:w-auto">
                    Processar e Salvar
                </button>
            </div>
            <div id="status" class="mt-4 text-sm font-medium"></div>
        </section>

        <section class="grid grid-cols-1 gap-6">
            <div class="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm">
                <input type="date" id="filtroData" value="2024-09-01" class="border rounded-lg p-2 flex-1">
                <button id="btnFiltrar" class="bg-slate-800 text-white px-6 py-2 rounded-lg hover:bg-slate-700">Ver Resultados</button>
            </div>

            <div id="gridResultados" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
